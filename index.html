<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Leersnacks TV</title>
    <style>

		html, body {
			margin: 0; background: black; height: 100%; color: white; font-family: Arial;
		}

		#videoFrame {
			position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border: 0;
		}

		#info {
			position: fixed; bottom: 20px; left: 20px; z-index: 99999;
			font-size: 28px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px;
		}
		

#startBtn {
    position: fixed; z-index: 99999; top:30%; left:45%; font-size: 40px; padding: 15px;
}

		
    </style>
</head>
<body>
<script src="https://player.vimeo.com/api/player.js"></script>

<button id="startBtn">Start</button>

<iframe id="videoFrame"
        src=""
        allow="autoplay; fullscreen"></iframe>
		
<div id="info"></div>

<script>
// ================================
// CONFIG: DATUM + TIJD BLOKKEN
// ================================
//
// Elk blok heeft:
// - startDatum
// - eindDatum
// - startTijd ("HH:MM")
// - eindTijd ("HH:MM")
// - videoID (van Vimeo)
//
const schedule = [

        videoID:    "1121079613" //Wiskunde in de kleuterklas
    },
	 {
        startDatum: "2026-04-20",
        eindDatum:  "2026-04-20",
        videoID:    "1119688308" //Kennisrijk curriculum
    },
	 {
        startDatum: "2026-04-23",
        eindDatum:  "2026-04-23",
        videoID:    "1123825957" //Wiskundetaal in de kleuterklas
    },
	 {
        startDatum: "2026-04-27",
        eindDatum:  "2026-04-27",
        videoID:    "1138014374" //Feedback die verschil maakt
    },
	 {
        startDatum: "2026-05-04",
        eindDatum:  "2026-05-04",
        videoID:    "1154230525" //De kracht van academisch optimisme
    },
	 {
        startDatum: "2026-05-07",
        eindDatum:  "2026-05-07",
        videoID:    "1143348205" //Van rekenen naar algebra
    },
	 {
        startDatum: "2026-05-11",
        eindDatum:  "2026-05-11",
        videoID:    "1168032245" //Voorkennis helpt, maar niet altijd
    },
	 {
        startDatum: "2026-05-18",
        eindDatum:  "2026-05-18",
        videoID:    "1145357642" //Partnerschap tussen school en ouders in het basisonderwijs
    },
	 {
        startDatum: "2026-05-21",
        eindDatum:  "2026-05-21",
        videoID:    "1164266903" //metacognitie en zelfregulerend leren bevorderen in het lager en secundair onderwijs
    },
	 {
        startDatum: "2026-05-28",
        eindDatum:  "2026-05-28",
        videoID:    "1172076535" //Versterken van leren: technologie als kracht
    },
	 {
        startDatum: "2026-06-01",
        eindDatum:  "2026-06-01",
        videoID:    "1129785096" //Model voor evidence-informed onderwijs
    }
       /*	
			0	'Vooruitblik 2025-2026'	'1119702815'
			1	'Kennisrijk curriculum'	'1119688308'
			2	'Wiskunde in de kleuterklas: lessen uit de wetenschap als input voor de praktijk'	'1121079613'
			3	'Wiskundetaal in de kleuterklas: hoe evidence-informed stimuleren?'	'1123825957'
			4	'Model voor evidence-informed onderwijs'	'1129785096'
			5	'Feedback die verschil maakt'	'1138014374'
			6	'Van rekenen naar algebra: de overgang naar het secundair onderwijs'	'1143348205'
			7	'Partnerschap tussen school en ouders in het basisonderwijs'	'1145357642'
			8	'De kracht van academisch optimisme: leerprestaties én eerlijke kansen bevorderen'	'1154230525'
			9	'Metacognitie en zelfregulerend leren bevorderen in lager en secundair onderwijs'	'1164266903'
			10	'Voorkennis helpt, maar niet altijd! Onderzoeksinzi…n rond het leren van breuken en decimale getallen'	'1168032245'
			11	'Versterken van leren: technologie als kracht'	'1172076535' 
		*/
]		
// ================================
// FUNCTIES
// ================================
function isNowInBlock(block) {
    const now = new Date();
    const startDate = new Date(block.startDatum);
    const endDate   = new Date(block.eindDatum);
	endDate.setHours(23,59,59,0);

    if (!(now >= startDate && now <= endDate)) return false;
	else return true; 
}

function getActiveBlock() {
    return schedule.find(block => isNowInBlock(block)) || null;
}

let player;

function updateTimer() {
    try {
		const info = document.getElementById("info");
		info.innerHTML = "";
		const block = getActiveBlock();

		if (!block) {
			info.innerHTML = "Geen geplande video's vandaag.";
			return;
		}
		else {	
			if (!videoStarted) {			
				loadVideo(block.videoID);
			}
		}
	} catch(e){
	document.getElementById("info").innerHTML= document.getElementById("info").innerHTML+'error';
	}
}

let videoStarted = false;

function loadVideo(videoID) {
    const iframe = document.getElementById("videoFrame");
    iframe.src = `https://player.vimeo.com/video/${videoID}?autoplay=1&muted=1&controls=0&background=1`;

    iframe.onload = () => {
       videoStarted =  true;
		player = new Vimeo.Player(iframe);
		if (player) player.setMuted(false);
    };
}

// ================================
// Startknop voor audio
// ================================

document.getElementById("startBtn").onclick = () => {
	const info = document.getElementById("info");
	info.innerHTML = "Selecteren van de video...";
	
	setInterval(updateTimer, 10000);
    document.getElementById("startBtn").style.display = "none";

};
</script>


</body>
</html>
