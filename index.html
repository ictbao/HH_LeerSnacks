// ================================
// FUNCTIES
// ================================

function parseTime(str) {
    const [h, m] = str.split(":").map(Number);
    const d = new Date();
    d.setHours(h, m, 0, 0);
    return d;
}

function blockEndDateTime(block) {
    let d = new Date(block.eindDatum);
    const [h, m] = block.eindTijd.split(":");
    d.setHours(h, m, 0, 0);
    return d;
}


function isNowInBlock(block) {
    const now = new Date();
    const startDate = new Date(block.startDatum);
    const endDate   = new Date(block.eindDatum);
	endDate.setHours(23,59,59,0);

    if (!(now >= startDate && now <= endDate)) return false;

    const startTime = parseTime(block.startTijd);
    const endTime   = parseTime(block.eindTijd);

    const nowHM = parseTime(
        now.getHours().toString().padStart(2, "0") + ":" + now.getMinutes().toString().padStart(2, "0")
    );

    return (nowHM >= startTime);// && nowHM <= endTime);
}

function getActiveBlock() {
    return schedule.find(block => isNowInBlock(block)) || null;
}

function getNextBlock() {
    const now = new Date();
    const future = schedule
        .map(b => ({ block: b, start: parseTime(b.startTijd) }))
        .filter(x => parseTime(x.block.startTijd) > now)
        .sort((a,b) => a.start - b.start);

    return future.length ? future[0].block : null;
}
